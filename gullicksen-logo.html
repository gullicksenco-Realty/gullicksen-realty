<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 40px; background: #f5f5f5; font-family: Arial, sans-serif; }
  .preview-label { color: #666; font-size: 14px; margin-bottom: 20px; }
  
  .logo-shield {
    width: 500px;
    height: 500px;
    background: linear-gradient(180deg, #00235A 0%, #001A3D 100%);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .eagle-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 380px;
    height: 380px;
    opacity: 0.12;
    filter: brightness(2) contrast(0.8);
  }

  .star {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 48px;
    color: #C5A44E;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }

  .company-name {
    position: absolute;
    top: 95px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 46px;
    font-weight: 900;
    color: white;
    letter-spacing: 8px;
    font-family: 'Georgia', 'Times New Roman', serif;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .co-badge {
    position: absolute;
    top: 155px;
    left: 50%;
    transform: translateX(-50%);
    width: 65px;
    height: 65px;
    border: 3px solid #C5A44E;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    font-size: 28px;
    font-weight: 700;
    color: #C5A44E;
    line-height: 1;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  .divider {
    position: absolute;
    top: 240px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C5A44E, transparent);
  }

  .subtitle-top {
    position: absolute;
    top: 260px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    color: #C5A44E;
    letter-spacing: 5px;
    font-family: 'Georgia', serif;
    font-weight: 400;
    white-space: nowrap;
  }

  .subtitle-bottom {
    position: absolute;
    top: 292px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    color: white;
    letter-spacing: 3px;
    font-family: 'Georgia', serif;
    font-weight: 400;
    white-space: nowrap;
    font-style: italic;
  }

  .tagline {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: #C5A44E;
    letter-spacing: 2px;
    font-family: 'Georgia', serif;
    font-weight: 400;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #C5A44E, #D4B65C, #C5A44E);
  }
</style>
</head>
<body>
  <div class="preview-label">Logo with Great Seal Eagle watermark (arrows & olive branch):</div>
  
  <div class="logo-shield">
    <img class="eagle-watermark" src="eagle.png" alt="">
    <div class="star">★</div>
    <div class="company-name">GULLICKSEN</div>
    <div class="co-badge">CO</div>
    <div class="divider"></div>
    <div class="subtitle-top">SEMPER FI</div>
    <div class="subtitle-bottom">Realty</div>
    <div class="tagline">Serving Those Who Served. And Everyone In Between.</div>
    <div class="bottom-bar"></div>
  </div>
</body>
</html>
